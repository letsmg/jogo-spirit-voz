name: 🚀 Deploy Atômico Spirit Echo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🤐 Criar Pacote de Deploy
        run: |
          mkdir build-tmp
          cp -r public build-tmp/
          cp .htaccess build-tmp/public/ 2>/dev/null || echo "Sem .htaccess"
          
          cd build-tmp
          zip -r ../deploy-spirit-echo.zip .
          cd ..

      - name: 🔑 Configure SSH & Known Hosts
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: 🚀 Deploy Atômico
        run: |
          scp deploy-spirit-echo.zip ubuntu@${{ secrets.SERVER_IP }}:/tmp/

          ssh ubuntu@${{ secrets.SERVER_IP }} << 'EOF'
            set -e
            
            BASE-DIR="/var/www/spirit-echo"
            
            sudo mkdir -p ${BASE-DIR}-shared
            sudo rm -rf ${BASE-DIR}-new
            sudo mkdir -p ${BASE-DIR}-new
            
            sudo unzip -o /tmp/deploy-spirit-echo.zip -d ${BASE-DIR}-new
            
            if [ -f "${BASE-DIR}-shared/.env" ]; then
                sudo ln -sfn ${BASE-DIR}-shared/.env ${BASE-DIR}-new/.env
            fi
            
            sudo chown -R www-data:www-data ${BASE-DIR}-new
            sudo chmod -R 755 ${BASE-DIR}-new
            
            # SWAP ATÔMICO
            sudo ln -sfn ${BASE-DIR}-new ${BASE-DIR}-live
            
            sudo rm /tmp/deploy-spirit-echo.zip
            echo "✅ Deploy Atômico Finalizado!"
          EOF