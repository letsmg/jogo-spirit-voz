name: Generate Contribution Animations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Gerar a Cobrinha (Snake) - Mantendo o que já funciona
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: letsmg
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            snake.svg
            snake-dark.svg?palette=github-dark

      # 👾 Gerar o Gráfico Retro (Substituindo o Pacman bugado)
      # Esta action gera um calendário isométrico/retro sem erros de XML
      - name: Generate Retro Pacman Style Graph
        uses: lowlighter/metrics@latest
        with:
          filename: pacman-contribution-graph.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: America/Sao_Paulo

      # 💾 Commit e Push
      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add snake.svg snake-dark.svg pacman-contribution-graph.svg
          git commit -m "chore: update contribution animations [skip ci]" || echo "no changes"
          git push